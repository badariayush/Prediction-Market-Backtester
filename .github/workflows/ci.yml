name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python 3.11 quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            apps/api/pyproject.toml
            packages/backtest-core/pyproject.toml
            packages/historical-data/pyproject.toml
            packages/strategy-sdk/pyproject.toml

      - name: Install packages and quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            -e packages/historical-data \
            -e packages/backtest-core \
            -e packages/strategy-sdk \
            -e apps/api
          python -m pip install pytest ruff mypy

      - name: Run tests
        run: pytest -q

      - name: Run Ruff
        run: ruff check apps packages

      - name: Run mypy
        run: >-
          mypy
          apps/api/src
          packages/backtest-core/src
          packages/historical-data/src
          packages/strategy-sdk/src

  web:
    name: Static web build and audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify static UI build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate
